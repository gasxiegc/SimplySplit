<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background: Deep Stone -->
  <rect width="512" height="512" fill="#4a403c"/>
  
  <g transform="translate(256, 256)">
    <!-- Outer Coin Ring (Kinari White) -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#fcfaf5" stroke-width="35" />
    
    <!-- The Split Line (Background Color to create cut effect) -->
    <path d="M-160 160 L160 -160" stroke="#4a403c" stroke-width="50" stroke-linecap="square" />
    
    <!-- Dot 1 (Nature Green) -->
    <circle cx="-70" cy="70" r="40" fill="#8fa892" />
    
    <!-- Dot 2 (Clay Orange) -->
    <circle cx="70" cy="-70" r="40" fill="#d68c76" />
  </g>
</svg>