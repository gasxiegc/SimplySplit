<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <!-- NOTE: We do NOT include a static apple-touch-icon link here pointing to SVG.
         iOS does not support SVG icons and may cache the failure (showing the default "S" icon).
         Instead, we inject the link tag via JavaScript once the PNG is fully generated. -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#fcfaf5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Simple Split">
    <title>Simple Split</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Zen Old Mincho"', 'serif'],
              sans: ['"Zen Maru Gothic"', 'sans-serif'],
            },
            colors: {
              kinari: '#fcfaf5', // Unbleached white
              stone: {
                50: '#fcfaf5',
                100: '#f5f0e6',
                200: '#e6dcc9',
                300: '#d6c6ad',
                400: '#bca38f',
                500: '#a38472',
                600: '#8c7b75', // Warm Grey/Deep Coffee
                700: '#6d5e58',
                800: '#4a403c', // Deep text
                900: '#2e2624',
              },
              nature: {
                green: '#8fa892',
                clay: '#d68c76',
                yellow: '#e8d48a'
              }
            }
          }
        }
      }
    </script>
    <script>
      // iOS Icon Fix (Immediate Execution)
      (function() {
        // FIXED: Updated SVG source to match the new icon.svg design
        var svgSource = '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" fill="#4a403c"/><g transform="translate(256, 256)"><circle cx="0" cy="0" r="190" fill="none" stroke="#fcfaf5" stroke-width="35" /><path d="M-160 160 L160 -160" stroke="#4a403c" stroke-width="50" stroke-linecap="square" /><circle cx="-70" cy="70" r="40" fill="#8fa892" /><circle cx="70" cy="-70" r="40" fill="#d68c76" /></g></svg>';
        
        var img = new Image();
        // Use btoa to base64 encode the SVG string
        img.src = 'data:image/svg+xml;base64,' + btoa(svgSource);
        
        img.onload = function() {
          var canvas = document.createElement('canvas');
          // Standard iOS icon size
          canvas.width = 180;
          canvas.height = 180;
          var ctx = canvas.getContext('2d');
          
          // Draw background explicitly
          ctx.fillStyle = '#4a403c';
          ctx.fillRect(0, 0, 180, 180);
          
          // Draw the SVG icon
          ctx.drawImage(img, 0, 0, 180, 180);
          
          // Convert to PNG data URI
          var pngData = canvas.toDataURL('image/png');
          
          // Dynamically create the link tag
          // This ensures iOS only sees the valid PNG link
          var link = document.createElement('link');
          link.rel = 'apple-touch-icon';
          link.href = pngData;
          document.head.appendChild(link);
        };
      })();
    </script>
    <style>
      body {
        background-color: #fcfaf5;
        font-family: 'Zen Maru Gothic', sans-serif;
        color: #4a403c;
        -webkit-font-smoothing: antialiased;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
