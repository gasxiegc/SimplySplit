    <script>
      // iOS Icon Fix (Immediate Execution)
      // We inline the SVG data and convert it to PNG immediately to ensure
      // it's ready when the user taps "Add to Home Screen".
      (function() {
        var svgSource = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#4a403c"/><g transform="translate(256, 256) scale(2.2)"><g transform="translate(-50, -50)"><path d="M30 25 C 20 25 15 35 20 45 L 45 20 C 35 15 25 20 30 25" stroke="#8fa892" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M70 75 C 80 75 85 65 80 55 L 55 80 C 65 85 75 80 70 75" stroke="#fcfaf5" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g></g></svg>';
        
        var img = new Image();
        // Use btoa to base64 encode the SVG string
        img.src = 'data:image/svg+xml;base64,' + btoa(svgSource);
        
        img.onload = function() {
          var canvas = document.createElement('canvas');
          canvas.width = 180;
          canvas.height = 180;
          var ctx = canvas.getContext('2d');
          
          // Draw background explicitly
          ctx.fillStyle = '#4a403c';
          ctx.fillRect(0, 0, 180, 180);
          
          // Draw the SVG icon
          ctx.drawImage(img, 0, 0, 180, 180);
          
          // Convert to PNG data URI
          var pngData = canvas.toDataURL('image/png');
          
          // Update the link tag
          var link = document.getElementById('apple-touch-icon');
          if (link) {
            link.href = pngData;
          }
        };
      })();
    </script>
